<!DOCTYPE html>
<html>
<head>
<title>AI Exam Assistant</title>
</head>

<body>

<h1>AI Exam Assistant</h1>

<h2>Upload PDF</h2>
<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<h2>Ask Question</h2>
<input type="text" id="question" placeholder="Ask from your notes">
<button onclick="askQuestion()">Ask</button>

<p id="response"></p>

<h2>Weak Topics</h2>
<button onclick="weakTopics()">Show Weak Topics</button>

<p id="weak"></p>

<h2>Generate Test</h2>
<button onclick="generateTest()">Generate Test</button>

<p id="test"></p>

<script>

async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("http://127.0.0.1:8000/upload", {
        method: "POST",
        body: formData
    });

    const result = await response.json();
    alert(result.message);
}


async function askQuestion() {
    const question = document.getElementById("question").value;

    const response = await fetch("http://127.0.0.1:8000/ask?question=" + question, {
        method: "POST"
    });

    const result = await response.json();
    document.getElementById("response").innerText = result.answer;
}


async function weakTopics() {
    const response = await fetch("http://127.0.0.1:8000/weak-topics");
    const result = await response.json();

    document.getElementById("weak").innerText = result.weak_topics;
}


async function generateTest() {
    const response = await fetch("http://127.0.0.1:8000/generate-test");
    const result = await response.json();

    document.getElementById("test").innerText = result.test;
}

</script>

</body>
</html>
