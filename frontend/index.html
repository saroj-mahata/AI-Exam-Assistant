<!DOCTYPE html>
<html>
<head>
<title>AI Exam Assistant</title>
</head>
<body>

<h1>AI Exam Assistant</h1>

<h2>Upload PDF</h2>
<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<h2>Ask Question</h2>
<input type="text" id="question" placeholder="Ask from your notes">
<button onclick="askQuestion()">Ask</button>

<p id="response"></p>

<script>
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("http://127.0.0.1:8000/upload", {
        method: "POST",
        body: formData
    });

    const result = await response.json();
    alert(result.message);
}

async function askQuestion() {
    const question = document.getElementById("question").value;

    const response = await fetch("http://127.0.0.1:8000/ask?question=" + question, {
        method: "POST"
    });

    const result = await response.json();
    document.getElementById("response").innerText = result.answer;
}
</script>

</body>
</html>
