<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exam Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .card { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 20px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">🤖 AI Exam Assistant</h1>

        <div class="card">
            <h2 class="text-xl font-semibold mb-4">1. Upload PDF Notes</h2>
            <input type="file" id="fileInput" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
            <button onclick="uploadFile()" class="mt-4 w-full bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-700 transition">Upload & Read PDF</button>
            <p id="upload-status" class="mt-2 text-sm text-gray-600 italic"></p>
        </div>

        <div class="card">
            <h2 class="text-xl font-semibold mb-4">2. Ask a Question</h2>
            <input type="text" id="question" placeholder="e.g., What are the main points of Chapter 1?" class="w-full p-2 border border-gray-300 rounded-lg">
            <button onclick="askQuestion()" class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">Ask AI</button>
            <div id="ai-response" class="mt-4 p-3 bg-gray-50 rounded border border-gray-200 min-h-[50px]">AI Response will appear here...</div>
        </div>

        <div class="card text-center">
            <h2 class="text-xl font-semibold mb-4">3. Analyze Study Gaps</h2>
            <button onclick="getWeakTopics()" class="w-full bg-purple-600 text-white py-2 rounded-lg font-bold hover:bg-purple-700 transition">Find My Weak Topics</button>
            <div id="weak-topics-list" class="mt-4 text-left"></div>
        </div>
    </div>

    <script>
        // CHANGE THIS TO YOUR RENDER URL
        const API_URL = "https://ai-exam-assistant-2dh7.onrender.com";

        async function uploadFile() {
            const fileInput = document.getElementById("fileInput");
            if (!fileInput.files.length) return alert("Please select a file first.");

            document.getElementById("upload-status").innerText = "Reading PDF... Please wait.";
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const response = await fetch(`${API_URL}/upload`, { method: "POST", body: formData });
                const result = await response.json();
                document.getElementById("upload-status").innerText = "✅ " + result.message;
            } catch (error) {
                document.getElementById("upload-status").innerText = "❌ Error connecting to backend.";
            }
        }

        async function askQuestion() {
            const question = document.getElementById("question").value;
            const responseDiv = document.getElementById("ai-response");
            responseDiv.innerText = "Thinking...";

            try {
                const response = await fetch(`${API_URL}/ask?question=${encodeURIComponent(question)}`, { method: "POST" });
                const result = await response.json();
                responseDiv.innerText = result.answer;
            } catch (error) {
                responseDiv.innerText = "❌ Error: Backend is asleep or disconnected.";
            }
        }

        async function getWeakTopics() {
            const listDiv = document.getElementById("weak-topics-list");
            listDiv.innerText = "Analyzing your notes...";

            try {
                const response = await fetch(`${API_URL}/weak-topics`);
                const result = await response.json();
                listDiv.innerText = result.weak_topics;
            } catch (error) {
                listDiv.innerText = "❌ Error fetching topics.";
            }
        }
    </script>
</body>
</html>
